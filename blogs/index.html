<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blogs | Ayushman Jena</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
  <nav class="container">
    <h2 class="logo">AJ</h2>
    <ul>
      <li><a href="../index.html">Home</a></li>
    </ul>
  </nav>
</header>

<section class="section container">

  <h1>Blogs & Notes</h1>

  <!-- SEARCH -->
  <input type="text" id="searchBar" placeholder="Search articles..." class="search-bar">

  <!-- BLOG LIST -->
  <div id="blogList">

    <!-- CATEGORY -->
    <h2>Acoustics</h2>

    <div class="blog-item">
      <div class="blog-content">
        <h3>COMSOL Simulation of Focused Ultrasound</h3>
        <a href="focused-ultrasound.html">Read</a>
      </div>
      <div class="blog-date">July 2025</div>
    </div>

    <div class="blog-item">
      <div class="blog-content">
        <h3>Acoustic Wave Equation Derivation</h3>
        <a href="wave-equation.html">Read</a>
      </div>
      <div class="blog-date">June 2025</div>
    </div>

    <!-- ADD MORE -->

  </div>

</section>

<script>
const searchBar = document.getElementById("searchBar");

searchBar.addEventListener("keyup", function() {
  const value = this.value.toLowerCase();
  const items = document.querySelectorAll(".blog-item");

  items.forEach(item => {
    item.style.display = item.innerText.toLowerCase().includes(value)
      ? "flex"
      : "none";
  });
});
</script>

</body>
</html>
